<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <title>ATZ — Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-black:  #000000;
      --c-1000:   #1C1C1C;
      --c-900:    #232627;
      --c-800:    #565B5E;
      --c-700:    #929292;
      --c-400:    #C7C7C7;
      --c-white:  #FFFFFF;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--c-black);
      color: var(--c-white);
      font-family: 'Inter', sans-serif;
      width: 100%;
      max-width: 393px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'lnum' 1, 'tnum' 1;
    }
    a { color: inherit; text-decoration: none; -webkit-tap-highlight-color: transparent; }
    button {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    textarea {
      background: none;
      border: none;
      color: var(--c-400);
      font-family: inherit;
      font-size: 15px;
      letter-spacing: -0.02em;
      line-height: 1.55;
      width: 100%;
      resize: none;
      outline: none;
    }
    textarea::placeholder {
      color: var(--c-800);
    }

    /* HEADER */
    .header {
      height: 71px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 13.5px;
      border-bottom: 1px solid var(--c-900);
    }
    .back {
      width: 13px; height: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--c-400);
    }
    .back::before {
      content: '';
      width: 8px; height: 8px;
      border-left: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
      transform: rotate(45deg);
      margin-left: 2px;
    }
    .back:active { opacity: 0.5; transition: opacity 80ms ease; }
    .exit {
      font-size: 14px;
      letter-spacing: -0.02em;
      color: var(--c-400);
      text-transform: capitalize;
    }
    .exit:active { opacity: 0.5; transition: opacity 80ms ease; }

    /* TITLE */
    .title-block {
      padding: 40px 20px 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .t-primary {
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--c-700);
      text-transform: capitalize;
      line-height: 1.15;
    }
    .t-secondary {
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--c-white);
      line-height: 1.15;
    }

    /* COLUMN */
    .col {
      padding: 56px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    /* SECTION header pattern */
    .section-header {
      padding: 0 0 14px;
      margin-bottom: 14px;
      border-bottom: 0.5px solid var(--c-900);
    }
    .section-title {
      font-size: 15px;
      color: var(--c-400);
      letter-spacing: -0.02em;
    }
    .section-meta {
      font-size: 11px;
      color: var(--c-700);
      letter-spacing: -0.02em;
      margin-left: 6px;
    }

    /* NEW NOTE input — bracketed frame */
    .new-note {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-frame {
      position: relative;
      padding: 16px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-frame::before,
    .input-frame::after,
    .input-frame .corner-bl,
    .input-frame .corner-br {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      pointer-events: none;
    }
    .input-frame::before {
      top: 0; left: 0;
      border-top: 0.5px solid var(--c-700);
      border-left: 0.5px solid var(--c-700);
    }
    .input-frame::after {
      top: 0; right: 0;
      border-top: 0.5px solid var(--c-700);
      border-right: 0.5px solid var(--c-700);
    }
    .input-frame .corner-bl {
      bottom: 0; left: 0;
      border-bottom: 0.5px solid var(--c-700);
      border-left: 0.5px solid var(--c-700);
    }
    .input-frame .corner-br {
      bottom: 0; right: 0;
      border-bottom: 0.5px solid var(--c-700);
      border-right: 0.5px solid var(--c-700);
    }
    .input-frame textarea {
      flex: 1;
      min-height: 88px;
    }
    .input-icons {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--c-700);
      align-self: flex-start;
    }
    .input-icons .icon {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
    }
    .input-icons .icon svg {
      width: 100%;
      height: 100%;
    }

    .save-row {
      display: flex;
      justify-content: flex-end;
      padding: 16px 0 0;
    }
    .save-link {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      font-size: 13px;
      color: var(--c-700);
      letter-spacing: -0.02em;
    }
    .save-link .arrow {
      font-weight: 300;
    }
    .save-link:active {
      opacity: 0.5;
      transition: opacity 80ms ease;
    }
    .save-link.active {
      color: var(--c-white);
    }

    /* NOTES LIST */
    .notes-list {
      display: flex;
      flex-direction: column;
    }
    .note-item {
      padding: 14px 0;
      border-bottom: 0.5px solid var(--c-900);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .note-item:first-child {
      padding-top: 0;
    }
    .note-item:last-child {
      border-bottom: none;
    }
    .note-body {
      font-size: 15px;
      color: var(--c-white);
      letter-spacing: -0.02em;
      line-height: 1.55;
    }
    .note-date {
      font-size: 11px;
      color: var(--c-700);
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="ATZ%20Memo.html" class="back" aria-label="Back"></a>
    <a href="Stock%20Page%20v5.html" class="exit" aria-label="Exit">Exit</a>
  </header>

  <div class="title-block">
    <span class="t-primary">Notes</span>
    <span class="t-secondary">Aritzia Inc · ATZ</span>
  </div>

  <div class="col">

    <!-- NEW NOTE -->
    <section class="new-note" aria-label="New note">
      <div class="section-header">
        <span class="section-title">New Note</span>
      </div>
      <div class="input-frame">
        <span class="corner-bl" aria-hidden="true"></span>
        <span class="corner-br" aria-hidden="true"></span>
        <textarea
          rows="4"
          placeholder="A thought, an observation, a price level you want to track…"
          aria-label="New note text"></textarea>
        <span class="input-icons" aria-hidden="true">
          <span class="icon" title="Paste from clipboard">
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="2" width="8" height="11" rx="1" stroke="currentColor" stroke-width="0.8" fill="none"/>
              <rect x="5" y="1" width="4" height="2" rx="0.5" fill="currentColor"/>
            </svg>
          </span>
          <span class="icon" title="Attach a file">
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9.5 6.5 L5.5 10.5 a2 2 0 0 1 -2.83 -2.83 L7.67 2.67 a2.5 2.5 0 0 1 3.54 3.54 L6.5 11 a1.5 1.5 0 0 1 -2.12 -2.12 L8 5"
                stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </span>
        </span>
      </div>
      <div class="save-row">
        <a href="#" class="save-link" aria-label="Save Note">
          <span class="arrow">→</span> Save Note
        </a>
      </div>
    </section>

    <!-- ALL NOTES -->
    <section class="all-notes" aria-label="All notes">
      <div class="section-header">
        <span class="section-title">All Notes <span class="section-meta">· 2</span></span>
      </div>
      <div class="notes-list">

        <article class="note-item">
          <p class="note-body">Considering whether to size up. Want to see US store rollout exceed 12 per year before adding.</p>
          <span class="note-date">Apr 27, 2026</span>
        </article>

        <article class="note-item">
          <p class="note-body">Q4 earnings beat. US revenue grew 32% YoY — reinforces the long thesis.</p>
          <span class="note-date">May 4, 2026</span>
        </article>

      </div>
    </section>

  </div>

  <script>
    // Active state on Save Note when textarea has content
    (function () {
      var textarea = document.querySelector('.new-note textarea');
      var save = document.querySelector('.save-link');
      if (!textarea || !save) return;
      textarea.addEventListener('input', function () {
        if (textarea.value.trim().length > 0) {
          save.classList.add('active');
        } else {
          save.classList.remove('active');
        }
      });
    })();
  </script>

</body>
</html>
